<!DOCTYPE html>
<html lang="nl">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
  <meta name="theme-color" content="#ff7a00" />
  <title>Grammatica Oefenen — Nederlands</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@500;600;700;800&family=Nunito+Sans:opsz,wght@6..12,400;6..12,600;6..12,700;6..12,800&display=swap"
    rel="stylesheet">
  <link rel="stylesheet" href="./css/styles.css" />
  <link rel="icon"
    href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🇳🇱</text></svg>" />
</head>

<body>
  <div class="app">
    <!-- Persistent header -->
    <header class="topbar" id="topbar">
      <button class="brand" id="brand" type="button" title="Naar het menu">
        <span class="brand-mark">🇳🇱</span>
        <span class="brand-text">Grammatica</span>
      </button>

      <div class="meter" id="meter" title="Jouw voortgang">
        <div class="lvl" id="lvl-badge">1</div>
        <div class="xp">
          <div class="xp-bar"><span id="xp-fill"></span></div>
          <div class="xp-label" id="xp-label">0 XP</div>
        </div>
        <div class="streak" id="streak" title="Dagenreeks"><span>🔥</span><b id="streak-count">0</b></div>
      </div>

      <div class="topbar-actions">
        <button class="icon-btn" id="theme-btn" type="button" title="Thema wisselen">🌗</button>
        <button class="icon-btn" id="settings-btn" type="button" title="Instellingen">⚙️</button>
      </div>
    </header>

    <!-- Screens get rendered here -->
    <main id="screen" class="screen"></main>
  </div>

  <!-- Settings drawer -->
  <div class="drawer-backdrop hidden" id="drawer-backdrop"></div>
  <aside class="drawer hidden" id="drawer" aria-label="Instellingen">
    <h2>Instellingen</h2>
    <div id="settings-body"></div>
    <button class="btn ghost danger" id="reset-btn" type="button">Alle voortgang wissen</button>
    <button class="btn ghost" id="drawer-close" type="button">Sluiten</button>
  </aside>

  <!-- Toast -->
  <div class="toast-wrap" id="toasts"></div>

  <!-- Data (globals) -->
  <script src="./data/topics.js"></script>
  <script src="./data/dehet.js"></script>
  <!-- App modules -->
  <script src="./js/store.js"></script>
  <script src="./js/fx.js"></script>
  <script src="./js/engine.js"></script>
  <script src="./js/app.js"></script>
</body>

</html>
